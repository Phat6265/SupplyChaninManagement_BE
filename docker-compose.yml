version: '3.8'

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  smartwarehouse:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mongo_auth:
  mongo_product:
  mongo_inventory:
  mongo_order:
  mongo_shipment:
  mongo_notification:
  redis_data:
  rabbitmq_data:

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── MongoDB instances (1 per service domain) ─────────────────────────────
  mongo-auth:
    image: mongo:7
    container_name: sw-mongo-auth
    volumes:
      - mongo_auth:/data/db
    networks:
      - smartwarehouse
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-product:
    image: mongo:7
    container_name: sw-mongo-product
    volumes:
      - mongo_product:/data/db
    networks:
      - smartwarehouse
    restart: unless-stopped

  mongo-inventory:
    image: mongo:7
    container_name: sw-mongo-inventory
    volumes:
      - mongo_inventory:/data/db
    networks:
      - smartwarehouse
    restart: unless-stopped

  mongo-order:
    image: mongo:7
    container_name: sw-mongo-order
    volumes:
      - mongo_order:/data/db
    networks:
      - smartwarehouse
    restart: unless-stopped

  mongo-shipment:
    image: mongo:7
    container_name: sw-mongo-shipment
    volumes:
      - mongo_shipment:/data/db
    networks:
      - smartwarehouse
    restart: unless-stopped

  mongo-notification:
    image: mongo:7
    container_name: sw-mongo-notification
    volumes:
      - mongo_notification:/data/db
    networks:
      - smartwarehouse
    restart: unless-stopped

  # ── Redis (shared cache + Socket.IO adapter) ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - smartwarehouse
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ (event-driven messaging) ────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: sw-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - smartwarehouse
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── auth-service ──────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: sw-auth-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo-auth:27017/sw_auth
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      RSA_PRIVATE_KEY_PATH: /app/keys/private.pem
      RSA_PUBLIC_KEY_PATH: /app/keys/public.pem
      JWT_EXPIRE: 7d
      JWT_REFRESH_EXPIRE: 30d
      CORS_ORIGIN: "http://localhost:8888,http://localhost:5173"
    volumes:
      - ./services/auth-service/keys:/app/keys:ro
    depends_on:
      mongo-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - smartwarehouse
    restart: unless-stopped

  # ── product-service ───────────────────────────────────────────────────────
  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    container_name: sw-product-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo-product:27017/sw_product
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      CORS_ORIGIN: http://localhost:8888
    depends_on:
      - mongo-product
      - redis
      - rabbitmq
    networks:
      - smartwarehouse
    restart: unless-stopped

  # ── inventory-service ─────────────────────────────────────────────────────
  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    container_name: sw-inventory-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo-inventory:27017/sw_inventory
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      CORS_ORIGIN: http://localhost:8888
    depends_on:
      - mongo-inventory
      - redis
      - rabbitmq
    networks:
      - smartwarehouse
    restart: unless-stopped

  # ── order-service ─────────────────────────────────────────────────────────
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: sw-order-service
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo-order:27017/sw_order
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      CORS_ORIGIN: http://localhost:8888
      INVENTORY_SERVICE_URL: http://inventory-service:3003
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
    depends_on:
      - mongo-order
      - redis
      - rabbitmq
      - inventory-service
      - notification-service
    networks:
      - smartwarehouse
    restart: unless-stopped

  # ── shipment-service ──────────────────────────────────────────────────────
  shipment-service:
    build:
      context: ./services/shipment-service
      dockerfile: Dockerfile
    container_name: sw-shipment-service
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo-shipment:27017/sw_shipment
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      CORS_ORIGIN: http://localhost:8888
    depends_on:
      - mongo-shipment
      - redis
      - rabbitmq
    networks:
      - smartwarehouse
    restart: unless-stopped

  # ── notification-service ──────────────────────────────────────────────────
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: sw-notification-service
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo-notification:27017/sw_notification
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      CORS_ORIGIN: "http://localhost:8888,http://localhost:3000,http://localhost:5173"
    depends_on:
      - mongo-notification
      - redis
      - rabbitmq
    networks:
      - smartwarehouse
    restart: unless-stopped

  # ── analytics-service ─────────────────────────────────────────────────────
  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: sw-analytics-service
    ports:
      - "3007:3007"
    environment:
      PORT: 3007
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      CORS_ORIGIN: http://localhost:8888
      PRODUCT_SERVICE_URL: http://product-service:3002
      INVENTORY_SERVICE_URL: http://inventory-service:3003
      ORDER_SERVICE_URL: http://order-service:3004
      SHIPMENT_SERVICE_URL: http://shipment-service:3005
      AUTH_SERVICE_URL: http://auth-service:3001
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
    depends_on:
      - redis
      - rabbitmq
      - product-service
      - inventory-service
      - order-service
      - shipment-service
    networks:
      - smartwarehouse
    restart: unless-stopped

  # ── api-gateway ───────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: sw-api-gateway
    ports:
      - "8888:8080"
    environment:
      PORT: 8080
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: "http://localhost:8888,http://localhost:3000,http://localhost:5173"
      AUTH_SERVICE_URL: http://auth-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      INVENTORY_SERVICE_URL: http://inventory-service:3003
      ORDER_SERVICE_URL: http://order-service:3004
      SHIPMENT_SERVICE_URL: http://shipment-service:3005
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
      ANALYTICS_SERVICE_URL: http://analytics-service:3007
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 300
    depends_on:
      - redis
      - auth-service
      - product-service
      - inventory-service
      - order-service
      - shipment-service
      - notification-service
      - analytics-service
    networks:
      - smartwarehouse
    restart: unless-stopped
